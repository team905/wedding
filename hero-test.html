<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>Hero Background Test · S&V Wedding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        body { background: #0a0a0a; }

        /* Compact preview hero (so the switcher panel is visible at once) */
        .hero { min-height: 100svh; }

        /* ===== Switcher panel ===== */
        .ht-panel {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            padding: 0.6rem 0.8rem;
            background: rgba(8, 5, 3, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.30);
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            max-width: calc(100vw - 24px);
            max-height: calc(100vh - 24px);
            overflow-y: auto;
        }
        .ht-group {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 0.25rem 0;
        }
        .ht-group + .ht-group { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 0.5rem; }
        .ht-group-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(245,217,166,0.65);
            padding: 0 0.4rem;
            white-space: nowrap;
        }
        .ht-fresh {
            background: rgba(245,217,166,0.08) !important;
            border-color: rgba(245,217,166,0.22) !important;
            color: #f5d9a6 !important;
        }
        .ht-fresh:hover { background: rgba(245,217,166,0.18) !important; }
        .ht-fresh.active {
            background: linear-gradient(135deg, #c1440e, #e86c24) !important;
            border-color: rgba(212,175,55,0.7) !important;
            color: #fff !important;
        }
        .ht-btn {
            padding: 0.45rem 0.85rem;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px;
            color: #e7e3da;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
        }
        .ht-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .ht-btn.active {
            background: linear-gradient(135deg, #c1440e, #e86c24);
            border-color: rgba(212,175,55,0.6);
            color: #fff;
            box-shadow: 0 4px 14px rgba(193,68,14,0.45);
        }
        .ht-label {
            position: fixed;
            bottom: 78px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            padding: 0.55rem 1.4rem;
            background: rgba(8, 5, 3, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212,175,55,0.30);
            border-radius: 999px;
            color: #f5d9a6;
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            max-width: calc(100vw - 24px);
        }
        .ht-label small {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.55);
            margin-top: 0.15rem;
            letter-spacing: 0.05em;
            font-style: normal;
        }
        .ht-deploy {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            padding: 0.7rem 1.4rem;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 999px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.35);
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .ht-deploy:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(34, 197, 94, 0.45); }
        .ht-deploy:active { transform: scale(0.97); }
        .ht-deploy svg { width: 14px; height: 14px; }

        /* Extra dark scrim on the hero so welcome text is always readable
           regardless of which background is loaded.  This is on top of the
           gradient in styles.css and gives us a guaranteed-legible canvas
           for the testing page.                                                 */
        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 22% 78%, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 60%),
                linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.20) 35%, rgba(0,0,0,0) 60%);
            pointer-events: none;
            z-index: 1;
        }
        .hero-body { z-index: 2; }

        /* Strengthen text shadows for guaranteed legibility */
        .hero-blessing,
        .hero-name,
        .hero-and,
        .hero-location,
        .hero-badge span {
            text-shadow:
                0 1px 4px rgba(0,0,0,0.75),
                0 2px 12px rgba(0,0,0,0.45);
        }

        @media (max-width: 700px) {
            .ht-panel { gap: 0.3rem; padding: 0.4rem 0.5rem; }
            .ht-btn { padding: 0.4rem 0.7rem; font-size: 0.72rem; }
            .ht-label { font-size: 0.82rem; top: 78px; }
        }
    </style>
</head>
<body>

    <!-- Switcher -->
    <div class="ht-panel" role="tablist" aria-label="Choose hero background">
        <div class="ht-group">
            <span class="ht-group-label">NEW · choose one of 10</span>
            <button class="ht-btn ht-fresh" data-opt="P1"  role="tab">1 · Couple · Hindu</button>
            <button class="ht-btn ht-fresh" data-opt="P2"  role="tab">2 · Varmala</button>
            <button class="ht-btn ht-fresh" data-opt="P3"  role="tab">3 · Newlyweds · Garland</button>
            <button class="ht-btn ht-fresh" data-opt="P4"  role="tab">4 · Bride · Ornate</button>
            <button class="ht-btn ht-fresh" data-opt="P5"  role="tab">5 · Bride · Soft</button>
            <button class="ht-btn ht-fresh" data-opt="P6"  role="tab">6 · Maharashtra Mandap</button>
            <button class="ht-btn ht-fresh" data-opt="P7"  role="tab">7 · Floral Stage</button>
            <button class="ht-btn ht-fresh" data-opt="P8"  role="tab">8 · Groom · Turban</button>
            <button class="ht-btn ht-fresh" data-opt="P9"  role="tab">9 · Bride · Pink</button>
            <button class="ht-btn ht-fresh" data-opt="P10" role="tab">10 · Outdoor Elegant</button>
        </div>
        <div class="ht-group">
            <span class="ht-group-label">Previous round</span>
            <button class="ht-btn" data-opt="H" role="tab" style="background:linear-gradient(135deg,#c1440e,#e86c24);color:#fff;border-color:rgba(212,175,55,0.6);">★ Heritage</button>
            <button class="ht-btn" data-opt="1" role="tab">A · Namaste (raw)</button>
            <button class="ht-btn" data-opt="2" role="tab">B · Tunnel</button>
            <button class="ht-btn" data-opt="3" role="tab">C · Forest</button>
            <button class="ht-btn" data-opt="4" role="tab">D · Smoke Arch</button>
            <button class="ht-btn" data-opt="5" role="tab">E · Day Mandap</button>
            <button class="ht-btn" data-opt="6" role="tab">F · Bokeh</button>
        </div>
    </div>
    <div class="ht-label" id="htLabel">
        Loading…
        <small id="htSub"></small>
    </div>

    <!-- Hero (same markup as index.html) -->
    <section id="home" class="hero">
        <div class="hero-bg">
            <picture id="heroPic">
                <source media="(min-width: 900px)" srcset="assets/hero-opt4-arch-desktop.jpg" id="heroSrc">
                <img src="assets/hero-opt4-arch-mobile.jpg" alt="Wedding background" class="hero-bg-img" id="heroImg">
            </picture>
            <div class="hero-bg-overlay"></div>
            <div class="hero-mandap-border"></div>
        </div>
        <div class="hero-body">
            <div class="hero-badge"><span>शुभ विवाह · Shubh Vivah</span></div>
            <div class="hero-blessings">
                <p class="hero-blessing">॥ श्री गणेशाय नमः ॥</p>
                <p class="hero-blessing">॥ नागाई माता प्रसन्न ॥</p>
                <p class="hero-blessing">॥ श्री स्वामी समर्थ ॥</p>
            </div>
            <h1 class="hero-title">
                <span class="hero-name">Shubham</span>
                <span class="hero-and">&</span>
                <span class="hero-name">Vaibhavi</span>
            </h1>
            <p class="hero-location">Jalgaon, Maharashtra</p>
            <div class="hero-countdown">
                <div class="cd-block"><span class="cd-num">209</span><span class="cd-label">days</span></div>
                <div class="cd-sep">·</div>
                <div class="cd-block"><span class="cd-num">18</span><span class="cd-label">hrs</span></div>
                <div class="cd-sep">·</div>
                <div class="cd-block"><span class="cd-num">42</span><span class="cd-label">min</span></div>
                <div class="cd-sep">·</div>
                <div class="cd-block"><span class="cd-num">07</span><span class="cd-label">sec</span></div>
            </div>
            <a href="javascript:void(0)" class="hero-btn">
                Confirm Your Presence
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
            </a>
        </div>
    </section>

    <button class="ht-deploy" id="deployBtn" title="Set this option as the live hero">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
        Use this one as my hero
    </button>

    <script>
        const OPTIONS = {
            // === Fresh round: 10 newly-fetched candidates ===
            'P1':  { slug: 'hero-pick1',  name: '1 · Couple · Hindu Ceremony',     note: 'Bride + groom · candid flower-petal toss' },
            'P2':  { slug: 'hero-pick2',  name: '2 · Varmala Exchange',            note: 'Maharashtrian style · garlands mid-toss' },
            'P3':  { slug: 'hero-pick3',  name: '3 · Newlyweds · Garland Portrait', note: 'Couple pinned right · blurred extension left' },
            'P4':  { slug: 'hero-pick4',  name: '4 · Bride · Ornate Gold',         note: 'Rich crimson palette · dramatic close-up' },
            'P5':  { slug: 'hero-pick5',  name: '5 · Bride · Soft Makeup',         note: 'Warm tones · serene downcast portrait' },
            'P6':  { slug: 'hero-pick6',  name: '6 · Maharashtra Mandap',          note: 'Mumbai venue · bamboo arches at twilight' },
            'P7':  { slug: 'hero-pick7',  name: '7 · Floral Stage',                note: 'Cinematic stage · red & gold florals' },
            'P8':  { slug: 'hero-pick8',  name: '8 · Groom · Turban & Pearl',      note: 'Ivory sherwani · regal · jewelry detail' },
            'P9':  { slug: 'hero-pick9',  name: '9 · Bride · Pink Lehenga',        note: 'Kolkata · royal lehenga · soft profile' },
            'P10': { slug: 'hero-pick10', name: '10 · Outdoor Elegant',            note: 'Misty morning mandap · destination wedding' },
            // === Previous round ===
            'H': { slug: 'hero-heritage',      name: '★ Heritage · Couple Namaste (cleaned)', note: 'Currently live on the homepage' },
            '1': { slug: 'hero-opt1-namaste',  name: 'A · Couple Namaste (raw)',  note: 'Original iStock with watermark visible' },
            '2': { slug: 'hero-opt2-tunnel',   name: 'B · Purple Mandap Tunnel',  note: 'Dark and dramatic · text reads excellently' },
            '3': { slug: 'hero-opt3-forest',   name: 'C · Sunlit Forest Couple',  note: 'Bright daylight · stronger scrim auto-applied' },
            '4': { slug: 'hero-opt4-arch',     name: 'D · Flower Arch · Smoke Sky', note: 'Cinematic atmospheric · couple distant' },
            '5': { slug: 'hero-opt5-mandap',   name: 'E · Daytime Pink Mandap',   note: 'Bright sky · strongest scrim auto-applied' },
            '6': { slug: 'hero-opt6-bokeh',    name: 'F · Bride Bokeh Entry',     note: 'Atmospheric · bride centred on the right' }
        };
        const params = new URLSearchParams(location.search);
        const initial = params.get('opt') || localStorage.getItem('sv_hero_opt') || 'P3';

        const heroSrc = document.getElementById('heroSrc');
        const heroImg = document.getElementById('heroImg');
        const label   = document.getElementById('htLabel');
        const sub     = document.getElementById('htSub');
        const btns    = document.querySelectorAll('.ht-btn');

        function applyOption(id) {
            const o = OPTIONS[id]; if (!o) return;
            // Pre-load to avoid flicker
            const test = new Image();
            test.onload = () => {
                heroSrc.srcset = `assets/${o.slug}-desktop.jpg`;
                heroImg.src    = `assets/${o.slug}-mobile.jpg`;
                heroImg.alt    = o.name;
            };
            test.src = `assets/${o.slug}-${window.innerWidth >= 900 ? 'desktop' : 'mobile'}.jpg`;
            label.firstChild.nodeValue = o.name;
            sub.textContent = o.note;
            btns.forEach(b => b.classList.toggle('active', b.dataset.opt === id));
            localStorage.setItem('sv_hero_opt', id);
            history.replaceState(null, '', `?opt=${id}`);
        }

        btns.forEach(b => b.addEventListener('click', () => applyOption(b.dataset.opt)));

        // Deploy button: posts the choice as a hash so admin can confirm
        document.getElementById('deployBtn').addEventListener('click', () => {
            const id = localStorage.getItem('sv_hero_opt') || '4';
            const o = OPTIONS[id];
            const cmd =
`To make "${o.name}" the live hero, change in index.html:

   <source ... srcset="assets/${o.slug}-desktop.jpg">
   <img    src="assets/${o.slug}-mobile.jpg"   ...>

Files already deployed at:
   /assets/${o.slug}-desktop.jpg
   /assets/${o.slug}-mobile.jpg

Or simply tell the agent: "use option ${id} as the hero".`;
            alert(cmd);
        });

        applyOption(initial);
    </script>
</body>
</html>
